name: CI

on:
  push:
    branches: [main, first-cut]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv venv
      - run: uv pip install ruff
      - run: uv run ruff check fast_agent_stack/
      - run: uv run ruff format --check fast_agent_stack/

  mypy:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv venv
      - run: uv pip install -e ".[auth-jwt,bedrock,openai,anthropic,litellm,email-smtp,tracing,tasks,rate-limit,admin,vector-qdrant,storage-s3,secrets-aws]"
      - run: uv pip install mypy
      - run: uv run mypy --strict fast_agent_stack/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            tox-env: py311
          - python-version: "3.12"
            tox-env: py312
          - python-version: "3.13"
            tox-env: py313
          - python-version: "3.14"
            tox-env: py314
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install tox
        run: uv venv && uv pip install tox tox-uv
      - name: Run tox
        run: uv run tox -e ${{ matrix.tox-env }}
